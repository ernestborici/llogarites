<!DOCTYPE html>
<html lang="sq">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>LLOGARITES</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

:root{
--ios-blue:#0A84FF; /* iOS18 blue */
--ios-bg:#F2F2F7;
--ios-card:rgba(255,255,255,0.85);
--text:#000;
--transition:.35s cubic-bezier(.25,1,.5,1);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--ios-bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{
background:var(--ios-card);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
height:64px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
border-bottom:.5px solid rgba(0,0,0,0.1);
position:sticky;
top:0;
z-index:100;
}

.header-logo-container{
position:absolute;
left:50%;
transform:translateX(-50%);
cursor:pointer;
display:flex;
align-items:center;
}

.header-logo-full{
height:32px;
max-width:180px;
object-fit:contain;
}

.menu-btn{
background:none;
border:none;
color:var(--ios-blue);
cursor:pointer;
padding:8px;
display:flex;
align-items:center;
}

.top-nav{
display:flex;
justify-content:center;
gap:32px;
background:white;
border-bottom:.5px solid #E5E5EA;
height:48px;
align-items:center;
}

.nav-btn{
background:none;
border:none;
font-size:15px;
font-weight:600;
color:#8E8E93;
cursor:pointer;
position:relative;
}

.nav-btn.active{ color:var(--ios-blue); }
.nav-btn.active::after{
content:"";
position:absolute;
bottom:-14px;
left:0;
right:0;
height:3px;
background:var(--ios-blue);
border-radius:2px;
}

.sidebar{
position:fixed;
top:0;
right:-100%;
width:280px;
height:100%;
background:var(--ios-bg);
z-index:200;
transition:var(--transition);
display:flex;
flex-direction:column;
border-left:.5px solid rgba(0,0,0,0.1);
}

.sidebar.active{ right:0; }

.sidebar-header{
padding:50px 20px 20px;
}

.sidebar-menu{ flex:1; padding:15px; overflow-y:auto; }

.menu-group{
background:white;
border-radius:12px;
margin-bottom:18px;
overflow:hidden;
border:.5px solid rgba(0,0,0,0.05);
}

.menu-item{
display:flex;
align-items:center;
width:100%;
padding:12px 15px;
border:none;
background:none;
font-size:16px;
cursor:pointer;
gap:12px;
border-bottom:.5px solid #F2F2F7;
color:var(--text);
transition:background .2s;
}

.menu-item i{ color:var(--ios-blue); width:20px; }

.menu-item:hover{ background:rgba(0,0,0,0.03); }

.sub-menu{
display:none;
flex-direction:column;
gap:5px;
padding-left:20px;
margin-top:5px;
}

.menu-item.open + .sub-menu{ display:flex; }

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
opacity:0;
visibility:hidden;
z-index:150;
transition:.3s;
backdrop-filter:blur(3px);
}

.overlay.active{ opacity:1; visibility:visible; }

main{ flex:1; background:white; overflow:hidden; position:relative; }

.page{ display:none; width:100%; height:100%; }
.page.active{ display:block; }

iframe{ width:100%; height:100%; border:none; }

.sidebar-footer{
padding:20px;
font-size:11px;
color:#8E8E93;
border-top:.5px solid rgba(0,0,0,0.05);
}

</style>
</head>

<body>

<header>
<div style="width:40px"></div>
<div class="header-logo-container" onclick="reloadApp()">
<img src="logo-full.png" class="header-logo-full">
</div>
<button class="menu-btn" onclick="toggleMenu()">
<i data-lucide="menu"></i>
</button>
</header>

<div class="top-nav">
<button class="nav-btn active" data-page="home" onclick="showPage('home',this)">KREDI</button>
<button class="nav-btn" data-page="produktet" onclick="showPage('produktet',this)">INTERESA</button>
<button class="nav-btn" data-page="paga" onclick="showPage('paga',this)">PAGA</button>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<aside class="sidebar" id="sidebar">

<div class="sidebar-header">
<h3>MENU</h3>
<p>Financë & Software</p>
</div>

<div class="sidebar-menu">

<!-- LOGARITESI KREDISE -->
<div class="menu-group">
<button class="menu-item" onclick="showPage('home')">
<i data-lucide="calculator"></i>
Llogaritësi Kredise
</button>
</div>

<!-- LOGARITESI PAGES -->
<div class="menu-group">
<button class="menu-item" onclick="showPage('produktet')">
<i data-lucide="bar-chart-3"></i>
Produktet & Interesat
</button>
<button class="menu-item" onclick="showPage('direktiva')">
<i data-lucide="file-text"></i>
Direktiva/UB
</button>
<button class="menu-item" onclick="showPage('module1')">
<i data-lucide="package"></i>
Formulare Aplikimi
</button>
<button class="menu-item" onclick="showPage('module2')">
<i data-lucide="layers"></i>
Modul 1
</button>
</div>

<!-- UPDATE -->
<div class="menu-group">
<button class="menu-item" onclick="reloadApp()">
<i data-lucide="refresh-cw"></i>
Update
</button>
</div>

<!-- ABOUT WITH SUBMENU -->
<div class="menu-group">
<button class="menu-item" id="aboutBtn">
<i data-lucide="info"></i>
About
</button>
<div class="sub-menu">
<button class="menu-item" onclick="showPage('about')">Rreth Aplikacionit</button>
<button class="menu-item" onclick="showPage('installation')">Si ta instalosh tel</button>
<button class="menu-item" onclick="showPage('suggestions')">Sugjerime</button>
<button class="menu-item" onclick="showPage('privacy')">Privacy & Policy</button>
<button class="menu-item" onclick="showPage('contact')">Kontakt</button>
</div>
</div>

</div>

<div class="sidebar-footer">
2026 <b>Ernest Boriçi</b><br>
© All rights reserved.
</div>

</aside>

<main>
<section id="home" class="page"></section>
<section id="produktet" class="page"></section>
<section id="paga" class="page"></section>
<section id="direktiva" class="page"></section>
<section id="module1" class="page"></section>
<section id="module2" class="page"></section>
<section id="about" class="page"></section>
<section id="suggestions" class="page"></section>
<section id="privacy" class="page"></section>
<section id="installation" class="page"></section>
<section id="contact" class="page"></section>
</main>

<script>
lucide.createIcons()

const sidebar=document.getElementById('sidebar')
const overlay=document.getElementById('overlay')
const aboutBtn=document.getElementById('aboutBtn')

function toggleMenu(){ sidebar.classList.toggle('active'); overlay.classList.toggle('active'); }
function reloadApp(){ location.reload(true); }

/* SHOW/HIDE PAGES */
function showPage(pageId,element){
if(sidebar.classList.contains('active')) toggleMenu()

document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.remove('active'))
const nav=document.querySelector(`.nav-btn[data-page="${pageId}"]`)
if(nav) nav.classList.add('active')
if(element && element.classList.contains('nav-btn')) element.classList.add('active')

document.querySelectorAll('.page').forEach(page=>page.classList.remove('active'))
const target=document.getElementById(pageId)
if(target) target.classList.add('active')

if(target && target.innerHTML.trim()===""){
const srcMap={
home:"Kredia.html",
produktet:"Produktet.html",
paga:"Paga.html",
direktiva:"Direktiva.html",
module1:"Module1.html",
module2:"Module2.html",
about:"About.html",
suggestions:"Suggestions.html",
privacy:"Privacy.html",
installation:"Installation.html",
contact:"Contact.html"
}
target.innerHTML=`<iframe src="${srcMap[pageId]}" loading="lazy"></iframe>`
}
}

/* SUBMENU FOR ABOUT */
aboutBtn.addEventListener('click',()=> aboutBtn.classList.toggle('open'))

/* LOAD HOME ON START */
window.onload=()=>{ showPage("home") }

/* PULL TO REFRESH */
let touchStart=0
document.addEventListener("touchstart",e=>{ touchStart=e.touches[0].clientY })
document.addEventListener("touchend",e=>{
let touchEnd=e.changedTouches[0].clientY
if(touchEnd-touchStart>120) reloadApp()
})
</script>

</body>
</html>
