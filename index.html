<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>| LLOGARITES |</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Llogaritës">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

:root{
--ios-blue:#007AFF;
--ios-bg:#F2F2F7;
--ios-card:rgba(255,255,255,0.85);
--text:#000;
--transition:0.35s cubic-bezier(.25,1,.5,1);
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--ios-bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{
background:var(--ios-card);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
height:64px;
display:flex;
align-items:center;
justify-content:center;
position:sticky;
top:0;
border-bottom:0.5px solid rgba(0,0,0,0.08);
z-index:100;
}

/* NAV TABS */

.top-tabs{
display:flex;
gap:28px;
font-size:15px;
font-weight:500;
}

.tab-btn{
background:none;
border:none;
cursor:pointer;
color:#8E8E93;
position:relative;
padding:4px 0;
font-weight:600;
}

.tab-btn.active{
color:var(--ios-blue);
}

.tab-btn.active::after{
content:"";
position:absolute;
bottom:-10px;
left:0;
right:0;
height:3px;
border-radius:3px;
background:var(--ios-blue);
}

/* MENU BUTTON */

.menu-btn{
position:absolute;
right:14px;
background:none;
border:none;
cursor:pointer;
color:var(--ios-blue);
padding:8px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
right:-100%;
width:280px;
height:100%;
background:var(--ios-bg);
z-index:200;
transition:var(--transition);
display:flex;
flex-direction:column;
border-left:0.5px solid rgba(0,0,0,0.08);
}

.sidebar.active{
right:0;
}

.sidebar-header{
padding:50px 20px 20px;
}

.sidebar-menu{
flex:1;
padding:15px;
overflow-y:auto;
}

.menu-group{
background:white;
border-radius:12px;
overflow:hidden;
margin-bottom:18px;
border:0.5px solid rgba(0,0,0,0.05);
}

.menu-item{
display:flex;
align-items:center;
width:100%;
padding:12px 15px;
border:none;
background:none;
font-size:16px;
cursor:pointer;
gap:12px;
border-bottom:0.5px solid #F2F2F7;
}

.menu-item i{
color:var(--ios-blue);
width:20px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
opacity:0;
visibility:hidden;
z-index:150;
transition:.3s;
backdrop-filter:blur(3px);
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* MAIN */

main{
flex:1;
background:white;
position:relative;
overflow:hidden;
}

.page{
display:none;
width:100%;
height:100%;
animation:fade .35s ease;
}

.page.active{
display:block;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* Animacion smooth */

@keyframes fade{
from{
opacity:0;
transform:translateY(6px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.sidebar-footer{
padding:20px;
font-size:11px;
color:#8E8E93;
border-top:0.5px solid rgba(0,0,0,0.05);
}

</style>
</head>

<body>

<header>

<div class="top-tabs">

<button class="tab-btn active" onclick="showPage('home',this)">
KREDI
</button>

<button class="tab-btn" onclick="showPage('produktet',this)">
INTERESA
</button>

<button class="tab-btn" onclick="showPage('paga',this)">
PAGA
</button>

</div>

<button class="menu-btn" onclick="toggleMenu()">
<i data-lucide="menu"></i>
</button>

</header>


<div class="overlay" id="overlay" onclick="toggleMenu()"></div>


<aside class="sidebar" id="sidebar">

<div class="sidebar-header">
<h3>MENU</h3>
<p>Financë & Software</p>
</div>

<div class="sidebar-menu">

<div class="menu-group">

<button class="menu-item" onclick="showPage('home')">
<i data-lucide="calculator"></i>
Llogaritës Kredie
</button>

<button class="menu-item" onclick="showPage('produktet')">
<i data-lucide="bar-chart-3"></i>
Produktet & Interesat
</button>

<button class="menu-item" onclick="showPage('paga')">
<i data-lucide="banknote"></i>
Paga Bruto/Neto
</button>

</div>

<div class="menu-group">

<button class="menu-item" onclick="window.location.href='tel:+355697788108'">
<i data-lucide="phone-call"></i>
Kontakti Direkt
</button>

<button class="menu-item" onclick="window.location.href='mailto:ernest.borici@gmail.com'">
<i data-lucide="mail"></i>
Sugjero një përmirësim
</button>

</div>

<div class="menu-group">

<button class="menu-item" onclick="showPage('about')">
<i data-lucide="info"></i>
Rreth Nesh
</button>

<button class="menu-item" onclick="showPage('privacy')">
<i data-lucide="shield"></i>
Privacy Policy
</button>

</div>

</div>

<div class="sidebar-footer">
2026 <b>Ernest Boriçi</b><br>
© All rights reserved.
</div>

</aside>


<main>

<section id="home" class="page"></section>
<section id="produktet" class="page"></section>
<section id="paga" class="page"></section>
<section id="about" class="page"></section>
<section id="privacy" class="page"></section>

</main>


<script>

lucide.createIcons()

const sidebar=document.getElementById('sidebar')
const overlay=document.getElementById('overlay')

function toggleMenu(){
sidebar.classList.toggle('active')
overlay.classList.toggle('active')
}

function showPage(pageId,element){

if(sidebar.classList.contains('active')){
toggleMenu()
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
btn.classList.remove('active')
})

if(element){
element.classList.add('active')
}

document.querySelectorAll('.page').forEach(page=>{
page.classList.remove('active')
})

const target=document.getElementById(pageId)

if(target){
target.classList.add('active')
}

if(target.innerHTML.trim()===""){

const srcMap={
home:"Kredia.html",
produktet:"Produktet.html",
paga:"Paga.html",
about:"About.html",
privacy:"Privacy.html"
}

target.innerHTML=`<iframe src="${srcMap[pageId]}" loading="lazy"></iframe>`
}

}

window.onload=()=>{
showPage("home",document.querySelector('.tab-btn'))
}

</script>

</body>
</html>
