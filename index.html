<!DOCTYPE html>
<html lang="sq">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="LLOGARITES - loan, interest, and salary calculators.">

<title>LLOGARITES</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5f5f7">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://unpkg.com/lucide@latest" defer></script>

<link rel="stylesheet" href="shell.css">
</head>

<body>

<header onclick="reloadApp()" role="button" tabindex="0" aria-label="Reload app">
<div class="header-logo-container" onclick="reloadApp()" role="button" tabindex="0" aria-label="Reload app">
<img src="logo-full.png" class="header-logo-full" alt="LLOGARITES" decoding="async">
</div>
</header>

<div class="header-actions">
<div class="header-left" role="button" tabindex="0" onclick="toggleMenu()" aria-label="Open menu">
<button class="menu-btn" type="button" aria-label="Open menu" aria-controls="sidebar" aria-expanded="false">
<i data-lucide="menu"></i>
</button>
<span class="menu-label">MENU</span>
</div>

<div class="header-right">
<nav class="top-nav" aria-label="Primary">

<button class="nav-btn active" type="button" data-page="home" onclick="showPage('home',this)" aria-current="page">
KREDI
</button>

<button class="nav-btn" type="button" data-page="paga" onclick="showPage('paga',this)">
PAGA
</button>

</nav>
</div>
</div>


<div class="overlay" id="overlay" onclick="toggleMenu()" aria-hidden="true"></div>


<aside class="sidebar" id="sidebar" aria-hidden="true" aria-labelledby="sidebar-title">

<div class="sidebar-menu">

<div class="menu-group">

<button class="menu-item" type="button" data-page="home" onclick="showPage('home')">
<i data-lucide="calculator"></i>
Llogarites Kredie
</button>

<button class="menu-item" type="button" data-page="paga" onclick="showPage('paga')">
<i data-lucide="banknote"></i>
Llogarites Page
</button>

<button class="menu-item" type="button" data-page="produktet" onclick="showPage('produktet')">
<i data-lucide="bar-chart-3"></i>
Produktet & Interesat
</button>

<button class="menu-item" type="button" data-page="direktiva" onclick="showPage('direktiva')">
<i data-lucide="file-text"></i>
UB / Formulare
</button>

</div>

<div class="menu-group">

<button class="menu-item" type="button" onclick="reloadApp()">
<i data-lucide="refresh-cw"></i>
Update
</button>

</div>

<div class="menu-group">

<button class="menu-item" type="button" onclick="showPage('install')">
<i data-lucide="download"></i>
Si ta instalojme
</button>

<button class="menu-item" type="button" onclick="showPage('contact')">
<i data-lucide="phone"></i>
Kontakt & Sugjerime
</button>

<button class="menu-item" type="button" onclick="showPage('privacy')">
<i data-lucide="shield"></i>
Privacy & Policy
</button>

</div>

</div>

<div class="sidebar-footer">
2026 Ernest Borici<br>
Llogarites v.1 (c) All rights reserved.
</div>

</aside>


<main>

<div class="main-layout">
<div class="content-area">
<section id="home" class="page" hidden aria-hidden="true"></section>
<section id="produktet" class="page" hidden aria-hidden="true"></section>
<section id="paga" class="page" hidden aria-hidden="true"></section>
<section id="direktiva" class="page" hidden aria-hidden="true"></section>
<section id="formular" class="page" hidden aria-hidden="true"></section>
<section id="about-app" class="page" hidden aria-hidden="true"></section>
<section id="install" class="page" hidden aria-hidden="true"></section>
<section id="contact" class="page" hidden aria-hidden="true"></section>
<section id="about" class="page" hidden aria-hidden="true"></section>
<section id="privacy" class="page" hidden aria-hidden="true"></section>
</div>
</div>

</main>


<script>

window.addEventListener('DOMContentLoaded',()=>{
if(window.lucide && typeof lucide.createIcons==='function'){
lucide.createIcons()
}

const homeMenu=document.querySelector(".menu-item[onclick=\"showPage('home')\"]")
const productsMenu=document.querySelector(".menu-item[onclick=\"showPage('produktet')\"]")
const salaryMenu=document.querySelector(".menu-item[onclick=\"showPage('paga')\"]")
if(homeMenu) homeMenu.childNodes[2].textContent="\nLlogarites Kredie\n"
if(salaryMenu) salaryMenu.childNodes[2].textContent="\nLlogarites Page\n"
if(productsMenu) productsMenu.childNodes[2].textContent="\nProduktet & Interesat\n"
})

const sidebar=document.getElementById('sidebar')
const overlay=document.getElementById('overlay')
const logoBtn=document.querySelector('.header-logo-container')
const headerBar=document.querySelector('header')
const menuBtn=document.querySelector('.menu-btn')
const menuArea=document.querySelector('.header-left')

logoBtn.addEventListener('keydown',e=>{
if(e.key==='Enter'||e.key===' '){
e.preventDefault()
reloadApp()
}
})
if(headerBar){
headerBar.addEventListener('keydown',e=>{
if(e.key==='Enter'||e.key===' '){
e.preventDefault()
reloadApp()
}
})
}

function toggleMenu(){

const isDesktop=window.matchMedia("(min-width: 900px)").matches
const isOpen=sidebar.classList.toggle('active')

if(isDesktop){
document.body.classList.toggle('sidebar-open',isOpen)
sidebar.setAttribute('aria-hidden',String(!isOpen))
document.querySelector(".menu-btn").setAttribute("aria-expanded",String(isOpen))
if(menuBtn) menuBtn.classList.toggle('open',isOpen)
if(menuArea) menuArea.classList.toggle('active',isOpen)
return
}

overlay.classList.toggle('active',isOpen)
sidebar.setAttribute('aria-hidden',String(!isOpen))
overlay.setAttribute('aria-hidden',String(!isOpen))
document.querySelector(".menu-btn").setAttribute("aria-expanded",String(isOpen))
if(menuBtn) menuBtn.classList.toggle('open',isOpen)
if(menuArea) menuArea.classList.toggle('active',isOpen)

}

function toggleAboutMenu(){
const submenu=document.getElementById('about-submenu')
const btn=document.getElementById('about-toggle')
const isOpen=submenu.classList.toggle('open')
submenu.setAttribute('aria-hidden',String(!isOpen))
btn.setAttribute('aria-expanded',String(isOpen))
}

function reloadApp(){

location.reload()

}

/* MAIN NAVIGATION */

function showPage(pageId,element){

if(!window.matchMedia("(min-width: 900px)").matches && sidebar.classList.contains('active')){
toggleMenu()
}

/* aktivizo tab siper */

document.querySelectorAll('.nav-btn').forEach(btn=>{
btn.classList.remove('active')
btn.removeAttribute('aria-current')
})

const nav=document.querySelector(`.nav-btn[data-page="${pageId}"]`)
if(nav){
nav.classList.add('active')
nav.setAttribute('aria-current','page')
}

if(element && element.classList.contains('nav-btn')){
element.classList.add('active')
element.setAttribute('aria-current','page')
}

document.querySelectorAll('.menu-item[data-page]').forEach(btn=>{
btn.classList.toggle('active',btn.dataset.page===pageId)
})

/* shfaq faqen */

document.querySelectorAll('.page').forEach(page=>{
page.classList.remove('active')
page.setAttribute('aria-hidden','true')
page.hidden=true
})

const target=document.getElementById(pageId)

if(target){
target.classList.add('active')
target.setAttribute('aria-hidden','false')
target.hidden=false
}

/* lazy load */

if(target.innerHTML.trim()===""){

const srcMap={
home:"Kredia.html",
produktet:"Produktet.html",
paga:"Paga.html",
direktiva:"Direktiva.html",
formular:"Formulare.html",
["about-app"]:"AboutApp.html",
install:"Install.html",
contact:"Kontakt.html",
about:"About.html",
privacy:"Privacy.html"
}

const titleMap={
home:"Llogarites Kredie",
produktet:"Produktet & Interesat",
paga:"Llogarites Page",
direktiva:"UB / Formulare",
formular:"Formulare",
["about-app"]:"Rreth aplikacionit",
install:"Si ta instalojme",
contact:"Kontakt & Sugjerime",
about:"Rreth Nesh",
privacy:"Privacy & Policy"
}

target.innerHTML=`<iframe src="${srcMap[pageId]}" title="${titleMap[pageId]||'Content'}" loading="lazy"></iframe>`

}

}

window.onload=()=>{
if(window.matchMedia("(min-width: 900px)").matches){
document.body.classList.add('sidebar-open')
sidebar.classList.add('active')
sidebar.setAttribute('aria-hidden','false')
document.querySelector(".menu-btn").setAttribute("aria-expanded","true")
if(menuBtn) menuBtn.classList.add('open')
if(menuArea) menuArea.classList.add('active')
}
showPage("home")
}

if("serviceWorker" in navigator){
window.addEventListener("load",()=>{
navigator.serviceWorker.register("./service-worker.js").catch(()=>{});
});
}

/* PULL TO REFRESH */

let touchStart=0

document.addEventListener("touchstart",e=>{
touchStart=e.touches[0].clientY
})

document.addEventListener("touchend",e=>{

let touchEnd=e.changedTouches[0].clientY

if(touchEnd-touchStart>120){
reloadApp()
}

})

</script>

</body>
</html>
