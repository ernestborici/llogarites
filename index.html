<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLOGARITËS | Ernest Boriçi</title>
  <style>
    :root {
      --primary: #0d47a1;
      --dark: #1a1a1a;
      --gray: #f4f4f4;
      --text: #333;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body { margin: 0; background: var(--gray); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

    /* Header me Butonin e Menusë */
    header {
      background: white;
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border-bottom: 1px solid #ddd;
      z-index: 10;
    }

    .menu-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .menu-btn span {
      display: block;
      width: 25px;
      height: 3px;
      background: var(--text);
      border-radius: 3px;
      transition: var(--transition);
    }

    header h1 { margin-left: 15px; font-size: 18px; color: var(--primary); }

    /* Sidebar (Menuja Anësore) */
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px; /* E fshehur */
      width: 280px;
      height: 100%;
      background: white;
      box-shadow: 2px 0 15px rgba(0,0,0,0.1);
      z-index: 100;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }

    .sidebar.active { left: 0; }

    .sidebar-header {
      padding: 20px;
      background: var(--primary);
      color: white;
    }

    .sidebar-menu { flex: 1; padding: 20px 0; overflow-y: auto; }

    .menu-item {
      display: block;
      width: 100%;
      padding: 15px 25px;
      border: none;
      background: none;
      text-align: left;
      font-size: 16px;
      color: var(--text);
      cursor: pointer;
      transition: 0.2s;
    }

    .menu-item:hover { background: #f0f4ff; color: var(--primary); }
    .menu-item.active { border-left: 4px solid var(--primary); background: #f0f4ff; font-weight: bold; }

    .divider { height: 1px; background: #eee; margin: 10px 0; }

    /* Overlay kur menuja eshte hapur */
    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      z-index: 90;
    }
    .overlay.active { display: block; }

    /* Main Content */
    main { flex: 1; width: 100%; position: relative; }
    .page { display: none; width: 100%; height: 100%; }
    .page.active { display: block; }
    iframe { width: 100%; height: 100%; border: none; }

    /* Footer Brenda Menusë */
    .sidebar-footer {
      padding: 20px;
      font-size: 12px;
      color: #888;
      border-top: 1px solid #eee;
    }

    .sidebar-footer b { color: var(--text); }

  </style>
</head>
<body>

  <header>
    <button class="menu-btn" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
    <h1>Llogaritës Pro</h1>
  </header>

  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>Ernest Boriçi</h3>
      <p style="font-size: 12px; margin:0; opacity: 0.8;">Software Developer</p>
    </div>

    <div class="sidebar-menu">
      <button class="menu-item active" onclick="showPage('home')">🏠 Llogaritës Kredie</button>
      <button class="menu-item" onclick="showPage('produktet')">📊 Produktet & Interesat</button>
      <button class="menu-item" onclick="showPage('paga')">💰 Paga Bruto/Neto</button>
      
      <div class="divider"></div>

      <button class="menu-item" onclick="alert('Moduli i Kontaktit:\nEmail: ernestborici@example.com\nTel: +355...')">📞 Kontakti</button>
      <button class="menu-item" onclick="window.location.href='mailto:ernestborici@example.com?subject=Sugjerim'">💡 Sugjero diçka</button>
      <button class="menu-item" onclick="alert('Rreth Aplikacionit:\nVersioni 1.0\nZhvilluar për lehtësimin e llogaritjeve financiare.')">ℹ️ Rreth nesh (About)</button>
    </div>

    <div class="sidebar-footer">
      &copy; 2024 <b>Ernest Boriçi</b><br>
      Të gjitha të drejtat të rezervuara.
    </div>
  </aside>

  <main>
    <section id="home" class="page active">
      <iframe src="Kredia.html"></iframe>
    </section>
    <section id="produktet" class="page">
      </section>
    <section id="paga" class="page">
      </section>
  </main>

  <script>
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const pages = document.querySelectorAll('.page');
    const menuItems = document.querySelectorAll('.menu-item');

    // Funksioni per Hapjen/Mbylljen e menusë
    function toggleMenu() {
      sidebar.classList.toggle('active');
      overlay.classList.toggle('active');
    }

    // Funksioni per Ndërrimin e faqeve
    function showPage(pageId) {
      // 1. Mbyll menunë
      toggleMenu();

      // 2. Menaxho klasat Active te butonat
      menuItems.forEach(item => item.classList.remove('active'));
      event.currentTarget.classList.add('active');

      // 3. Shfaq faqen
      pages.forEach(page => page.classList.remove('active'));
      const targetPage = document.getElementById(pageId);
      targetPage.classList.add('active');

      // 4. Lazy Load për iframes (opsionale por e rekomanduar)
      if(targetPage.innerHTML.trim() === "") {
         let src = (pageId === 'produktet') ? 'Produktet.html' : 'Paga.html';
         targetPage.innerHTML = `<iframe src="${src}"></iframe>`;
      }
    }
  </script>

</body>
</html>
