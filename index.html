<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Llogaritës">

  <title>Llogaritës Pro</title>
  
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --ios-blue: #007AFF;
      --ios-bg: #F2F2F7;
      --ios-card: rgba(255, 255, 255, 0.85);
      --text: #000000;
      --transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--ios-bg);
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior-y: contain; 
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--ios-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
      z-index: 100;
      position: sticky;
      top: 0;
      flex-shrink: 0;
    }

    /* Logoja e gjatë në Header */
    .header-logo-container {
      cursor: pointer;
      display: flex;
      align-items: center;
      height: 100%;
      transition: opacity 0.2s;
    }
    .header-logo-container:active { opacity: 0.6; }
    
    .header-logo-full {
      height: 28px; /* Rregulloje sipas dëshirës */
      width: auto;
      object-fit: contain;
    }

    .menu-btn {
      background: none;
      border: none;
      color: var(--ios-blue);
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
    }

    /* Sidebar Styles */
    .sidebar {
      position: fixed;
      top: 0; right: -100%;
      width: 280px; height: 100%;
      background: var(--ios-bg);
      z-index: 200;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      border-left: 0.5px solid rgba(0,0,0,0.1);
    }
    .sidebar.active { right: 0; }

    .sidebar-header { padding: 50px 20px 20px; }
    .sidebar-menu { flex: 1; padding: 15px; overflow-y: auto; }
    
    .menu-group {
      background: white;
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .menu-item {
      display: flex; align-items: center;
      width: 100%; padding: 12px 15px;
      border: none; background: none;
      font-size: 16px; cursor: pointer; gap: 12px;
      border-bottom: 0.5px solid #F2F2F7;
    }
    .menu-item.active { background-color: #F2F2F7; font-weight: 600; }
    .menu-item i { color: var(--ios-blue); }

    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      display: none; z-index: 150;
      backdrop-filter: blur(3px);
    }
    .overlay.active { display: block; }

    main { flex: 1; position: relative; background: white; overflow: hidden; }
    .page { display: none; width: 100%; height: 100%; }
    .page.active { display: block; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>

<header>
  <div style="width: 40px;"></div> <div class="header-logo-container" onclick="window.location.reload()">
    <img src="logo-full.png" alt="LLOGARITËS" class="header-logo-full">
  </div>

  <button class="menu-btn" onclick="toggleMenu()">
    <i data-lucide="menu"></i>
  </button>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3 style="margin:0">MENU</h3>
    <p style="color:#8E8E93; font-size:13px; margin:4px 0">Financë & Software</p>
  </div>
  <div class="sidebar-menu">
    <div class="menu-group">
      <button class="menu-item" onclick="showPage('home', this)">
        <i data-lucide="calculator"></i> Llogaritës Kredie
      </button>
      <button class="menu-item" onclick="showPage('paga', this)">
        <i data-lucide="banknote"></i> Paga Bruto/Neto
      </button>
    </div>
    <div class="menu-group">
      <button class="menu-item" onclick="window.location.href='tel:+355697788108'">
        <i data-lucide="phone"></i> Kontakti
      </button>
    </div>
  </div>
</aside>

<main>
  <section id="home" class="page"></section>
  <section id="paga" class="page"></section>
</main>

<script>
  lucide.createIcons();

  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');

  function toggleMenu() {
    sidebar.classList.toggle('active');
    overlay.classList.toggle('active');
  }

  function showPage(pageId, element) {
    if(sidebar.classList.contains('active')) toggleMenu();
    document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
    if(element) element.classList.add('active');

    document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
    const targetPage = document.getElementById(pageId);
    if(targetPage) {
        targetPage.classList.add('active');
        if(targetPage.innerHTML.trim() === "") {
            const srcMap = { 'home': 'Kredia.html', 'paga': 'Paga.html' };
            targetPage.innerHTML = `<iframe src="${srcMap[pageId]}"></iframe>`;
        }
    }
  }

  window.onload = () => showPage('home');
</script>

</body>
</html>
