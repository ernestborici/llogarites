<!DOCTYPE html>
<html lang="sq">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>| LLOGARITES |</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Llogaritës">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

:root{
--ios-blue:#007AFF;
--ios-bg:#F2F2F7;
--ios-card:rgba(255,255,255,0.85);
--text:#000;
--transition:.35s cubic-bezier(.25,1,.5,1);
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--ios-bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */

header{
background:var(--ios-card);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
height:64px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
border-bottom:0.5px solid rgba(0,0,0,0.1);
position:sticky;
top:0;
z-index:100;
}

/* LOGO */

.header-logo-container{
position:absolute;
left:50%;
transform:translateX(-50%);
cursor:pointer;
display:flex;
align-items:center;
}

.header-logo-full{
height:32px;
max-width:180px;
object-fit:contain;
}

.header-logo-container:active{
opacity:.6;
}

/* MENU BUTTON */

.menu-btn{
background:none;
border:none;
color:var(--ios-blue);
cursor:pointer;
padding:8px;
display:flex;
align-items:center;
z-index:110;
}

/* TOP NAV */

.top-nav{
display:flex;
justify-content:center;
gap:30px;
background:white;
border-bottom:0.5px solid #E5E5EA;
height:48px;
align-items:center;
}

.nav-btn{
background:none;
border:none;
font-size:15px;
font-weight:600;
color:#8E8E93;
cursor:pointer;
position:relative;
}

.nav-btn.active{
color:var(--ios-blue);
}

.nav-btn.active::after{
content:"";
position:absolute;
bottom:-14px;
left:0;
right:0;
height:3px;
background:var(--ios-blue);
border-radius:2px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
right:-100%;
width:280px;
height:100%;
background:var(--ios-bg);
z-index:200;
transition:var(--transition);
display:flex;
flex-direction:column;
border-left:0.5px solid rgba(0,0,0,0.1);
}

.sidebar.active{
right:0;
}

.sidebar-header{
padding:50px 20px 20px;
}

.sidebar-menu{
flex:1;
padding:15px;
overflow-y:auto;
}

.menu-group{
background:white;
border-radius:12px;
margin-bottom:18px;
overflow:hidden;
border:0.5px solid rgba(0,0,0,0.05);
}

.menu-item{
display:flex;
align-items:center;
width:100%;
padding:12px 15px;
border:none;
background:none;
font-size:16px;
cursor:pointer;
gap:12px;
border-bottom:0.5px solid #F2F2F7;
}

.menu-item i{
color:var(--ios-blue);
width:20px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
opacity:0;
visibility:hidden;
z-index:150;
transition:.3s;
backdrop-filter:blur(3px);
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* MAIN */

main{
flex:1;
background:white;
position:relative;
overflow:hidden;
}

.page{
display:none;
width:100%;
height:100%;
animation:fade .35s ease;
}

.page.active{
display:block;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* ANIMATION */

@keyframes fade{
from{
opacity:0;
transform:translateY(6px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.sidebar-footer{
padding:20px;
font-size:11px;
color:#8E8E93;
border-top:0.5px solid rgba(0,0,0,0.05);
}

</style>
</head>

<body>

<header>

<div style="width:40px"></div>

<div class="header-logo-container" onclick="window.location.reload()">
<img src="logo-full.png" class="header-logo-full">
</div>

<button class="menu-btn" onclick="toggleMenu()">
<i data-lucide="menu"></i>
</button>

</header>


<!-- NAV POSHTE HEADER -->

<div class="top-nav">

<button class="nav-btn active" onclick="showPage('home',this)">
KREDI
</button>

<button class="nav-btn" onclick="showPage('produktet',this)">
INTERESA
</button>

<button class="nav-btn" onclick="showPage('paga',this)">
PAGA
</button>

</div>


<div class="overlay" id="overlay" onclick="toggleMenu()"></div>


<aside class="sidebar" id="sidebar">

<div class="sidebar-header">
<h3>MENU</h3>
<p>Financë & Software</p>
</div>

<div class="sidebar-menu">

<div class="menu-group">

<button class="menu-item" onclick="showPage('home')">
<i data-lucide="calculator"></i>
Llogaritës Kredie
</button>

<button class="menu-item" onclick="showPage('produktet')">
<i data-lucide="bar-chart-3"></i>
Produktet & Interesat
</button>

<button class="menu-item" onclick="showPage('paga')">
<i data-lucide="banknote"></i>
Paga Bruto/Neto
</button>

</div>

<div class="menu-group">

<button class="menu-item" onclick="window.location.href='tel:+355697788108'">
<i data-lucide="phone-call"></i>
Kontakti Direkt
</button>

<button class="menu-item" onclick="window.location.href='mailto:ernest.borici@gmail.com'">
<i data-lucide="mail"></i>
Sugjero një përmirësim
</button>

</div>

<div class="menu-group">

<button class="menu-item" onclick="showPage('about')">
<i data-lucide="info"></i>
Rreth Nesh
</button>

<button class="menu-item" onclick="showPage('privacy')">
<i data-lucide="shield"></i>
Privacy Policy
</button>

</div>

</div>

<div class="sidebar-footer">
2026 <b>Ernest Boriçi</b><br>
© All rights reserved.
</div>

</aside>


<main>

<section id="home" class="page"></section>
<section id="produktet" class="page"></section>
<section id="paga" class="page"></section>
<section id="about" class="page"></section>
<section id="privacy" class="page"></section>

</main>


<script>

lucide.createIcons()

const sidebar=document.getElementById('sidebar')
const overlay=document.getElementById('overlay')

function toggleMenu(){

sidebar.classList.toggle('active')
overlay.classList.toggle('active')

}

function showPage(pageId,element){

if(sidebar.classList.contains('active')){
toggleMenu()
}

document.querySelectorAll('.nav-btn').forEach(btn=>{
btn.classList.remove('active')
})

if(element){
element.classList.add('active')
}

document.querySelectorAll('.page').forEach(page=>{
page.classList.remove('active')
})

const target=document.getElementById(pageId)

if(target){
target.classList.add('active')
}

if(target.innerHTML.trim()===""){

const srcMap={
home:"Kredia.html",
produktet:"Produktet.html",
paga:"Paga.html",
about:"About.html",
privacy:"Privacy.html"
}

target.innerHTML=`<iframe src="${srcMap[pageId]}" loading="lazy"></iframe>`

}

}

window.onload=()=>{
showPage("home",document.querySelector('.nav-btn'))
}

</script>

</body>
</html>
