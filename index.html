<!DOCTYPE html>
<html lang="sq">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Llogaritës Financiar</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>

:root{
--primary:#007AFF;
--bg:#F2F2F7;
--card:rgba(255,255,255,0.85);
--text:#1C1C1E;
--border:#E5E5EA;
--transition:0.35s ease;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:var(--card);
backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
}

header h1{
font-size:17px;
font-weight:600;
}

.menu-btn{
border:none;
background:none;
cursor:pointer;
color:var(--primary);
display:flex;
align-items:center;
}

.sidebar{

position:fixed;
top:0;
right:-100%;
width:300px;
height:100%;
background:var(--card);
backdrop-filter:blur(25px);
border-left:1px solid var(--border);
transition:var(--transition);
display:flex;
flex-direction:column;
z-index:200;

}

.sidebar.active{
right:0;
}

.sidebar-header{
padding:35px 25px 15px;
}

.sidebar-header h3{
font-size:20px;
}

.sidebar-header p{
font-size:13px;
color:#8E8E93;
}

.sidebar-menu{
flex:1;
padding:10px;
}

.menu-group{
background:white;
border-radius:12px;
overflow:hidden;
margin-bottom:20px;
}

.menu-item{

display:flex;
align-items:center;
gap:12px;

padding:14px;

border:none;
background:none;
width:100%;
font-size:16px;
cursor:pointer;
border-bottom:1px solid var(--border);

}

.menu-item:last-child{
border-bottom:none;
}

.menu-item i{
color:var(--primary);
}

.menu-item.active{
font-weight:600;
}

.menu-item:hover{
background:#F7F7F7;
}

.sidebar-footer{
padding:20px;
font-size:11px;
color:#8E8E93;
}

.overlay{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.2);
display:none;
z-index:150;

}

.overlay.active{
display:block;
}

main{
flex:1;
background:white;
}

.page{
display:none;
width:100%;
height:100%;
}

.page.active{
display:block;
}

iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>


<body>


<header>

<div style="width:40px"></div>

<h1>Llogaritës Financiar</h1>

<button class="menu-btn" onclick="toggleMenu()">
<i data-lucide="menu"></i>
</button>

</header>


<div class="overlay" id="overlay" onclick="toggleMenu()"></div>


<aside class="sidebar" id="sidebar">

<div class="sidebar-header">
<h3>Ernest Boriçi</h3>
<p>Finance & Software</p>
</div>


<div class="sidebar-menu">

<div class="menu-group">

<button class="menu-item active" data-page="home">
<i data-lucide="calculator"></i>
Llogaritës Kredie
</button>

<button class="menu-item" data-page="produktet">
<i data-lucide="bar-chart-3"></i>
Produktet & Interesat
</button>

<button class="menu-item" data-page="paga">
<i data-lucide="banknote"></i>
Paga Bruto / Neto
</button>

</div>


<div class="menu-group">

<button class="menu-item" onclick="window.location.href='tel:+355XXXXXXXX'">
<i data-lucide="phone"></i>
Kontakti
</button>

<button class="menu-item" onclick="window.location.href='mailto:ernest@email.com'">
<i data-lucide="mail"></i>
Sugjero përmirësim
</button>

<button class="menu-item" onclick="alert('Llogaritës Financiar\nVersioni 2.1')">
<i data-lucide="info"></i>
Rreth aplikacionit
</button>

</div>

</div>


<div class="sidebar-footer">

© 2026  
<b>Ernest Boriçi</b>

</div>

</aside>



<main>

<section id="home" class="page active">
<iframe src="Kredia.html"></iframe>
</section>

<section id="produktet" class="page"></section>

<section id="paga" class="page"></section>

</main>



<script>

lucide.createIcons();

const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")

const pages=document.querySelectorAll(".page")
const menuItems=document.querySelectorAll(".menu-item[data-page]")


function toggleMenu(){

sidebar.classList.toggle("active")
overlay.classList.toggle("active")

}



menuItems.forEach(button=>{

button.addEventListener("click",function(){

const page=this.dataset.page

toggleMenu()

menuItems.forEach(b=>b.classList.remove("active"))
this.classList.add("active")

pages.forEach(p=>p.classList.remove("active"))

const target=document.getElementById(page)

target.classList.add("active")

if(target.innerHTML.trim()===""){

let src=""

if(page==="produktet") src="Produktet.html"
if(page==="paga") src="Paga.html"

target.innerHTML=`<iframe src="${src}"></iframe>`

}

})

})

</script>


</body>
</html>
