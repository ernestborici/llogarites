<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>| LLOGARITES |</title>
  
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --ios-blue: #007AFF;
      --ios-bg: #F2F2F7;
      --ios-card: rgba(255, 255, 255, 0.85);
      --text: #000000;
      --transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--ios-bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--ios-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
      z-index: 100;
      flex-shrink: 0;
    }

    header h1 { font-size: 17px; font-weight: 600; margin: 0; letter-spacing: -0.3px; }

    .menu-btn {
      background: none;
      border: none;
      color: var(--ios-blue);
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      transition: opacity 0.2s;
    }
    .menu-btn:active { opacity: 0.5; }

    /* Sidebar logic */
    .sidebar {
      position: fixed;
      top: 0;
      right: -100%;
      width: 280px;
      height: 100%;
      background: var(--ios-bg);
      box-shadow: -5px 0 15px rgba(0,0,0,0.05);
      z-index: 200;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      border-left: 0.5px solid rgba(0,0,0,0.1);
    }
    .sidebar.active { right: 0; }

    .sidebar-header { padding: 50px 20px 20px; }
    .sidebar-header h3 { margin: 0; font-size: 20px; font-weight: 700; }
    .sidebar-header p { margin: 4px 0 0; font-size: 13px; color: #8E8E93; }

    .sidebar-menu { 
      flex: 1; 
      padding: 15px; 
      overflow-y: auto; 
      -webkit-overflow-scrolling: touch;
    }
    
    .menu-group {
      background: white;
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
      border: 0.5px solid rgba(0,0,0,0.05);
    }

    .menu-item {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 12px 15px;
      border: none;
      background: none;
      font-size: 16px;
      color: var(--text);
      cursor: pointer;
      gap: 12px;
      border-bottom: 0.5px solid #F2F2F7;
      text-align: left;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item i { color: var(--ios-blue); width: 20px; height: 20px; }
    .menu-item:active { background-color: #E5E5EA; }
    .menu-item.active { background-color: #F2F2F7; font-weight: 600; }

    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      opacity: 0;
      visibility: hidden;
      z-index: 150;
      transition: 0.3s;
      backdrop-filter: blur(3px);
    }
    .overlay.active { opacity: 1; visibility: visible; }

    main { flex: 1; position: relative; background: white; }
    .page { display: none; width: 100%; height: 100%; }
    .page.active { display: block; }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    .sidebar-footer {
      padding: 20px;
      font-size: 11px;
      color: #8E8E93;
      border-top: 0.5px solid rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

<header>
  <div style="width: 40px;"></div>
  <h1>Llogaritës Pro</h1>
  <button class="menu-btn" onclick="toggleMenu()">
    <i data-lucide="menu"></i>
  </button>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>Ernest Boriçi</h3>
    <p>Financë & Zhvillim Software</p>
  </div>

  <div class="sidebar-menu">
    <div class="menu-group">
      <button class="menu-item" onclick="showPage('home', this)">
        <i data-lucide="calculator"></i> Llogaritës Kredie
      </button>
      <button class="menu-item" onclick="showPage('produktet', this)">
        <i data-lucide="bar-chart-3"></i> Produktet & Interesat
      </button>
      <button class="menu-item" onclick="showPage('paga', this)">
        <i data-lucide="banknote"></i> Paga Bruto/Neto
      </button>
    </div>

    <div class="menu-group">
      <button class="menu-item" onclick="window.location.href='tel:+355XXXXXXXXX'">
        <i data-lucide="phone-call"></i> Kontakti Direkt
      </button>
      <button class="menu-item" onclick="window.location.href='mailto:ernestborici@email.com'">
        <i data-lucide="mail"></i> Sugjero një përmirësim
      </button>
    </div>

    <div class="menu-group">
      <button class="menu-item" onclick="showPage('about', this)">
        <i data-lucide="info"></i> Rreth Nesh
      </button>
      <button class="menu-item" onclick="showPage('privacy', this)">
        <i data-lucide="shield"></i> Privacy Policy
      </button>
    </div>
  </div>

  <div class="sidebar-footer">
    2026 <b>Ernest Boriçi</b><br>© All rights reserved.
  </div>
</aside>

<main>
  <section id="home" class="page"></section>
  <section id="produktet" class="page"></section>
  <section id="paga" class="page"></section>
  <section id="about" class="page"></section>
  <section id="privacy" class="page"></section>
</main>

<script>
  // Inicializimi i ikonave
  lucide.createIcons();

  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');

  function toggleMenu() {
    sidebar.classList.toggle('active');
    overlay.classList.toggle('active');
  }

  function showPage(pageId, element) {
    // Mbyll menunë nese eshte hapur
    if(sidebar.classList.contains('active')) toggleMenu();

    // Hiq klasën active nga të gjithë butonat
    document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
    
    // Shto klasën active te butoni i klikuar (nëse ekziston)
    if(element) {
      element.classList.add('active');
    } else {
      // Përzgjedh butonin e parë nese thirret pa element (psh në fillim)
      document.querySelector(`button[onclick*="${pageId}"]`).classList.add('active');
    }

    // Menaxho shfaqjen e faqeve
    document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
    const targetPage = document.getElementById(pageId);
    targetPage.classList.add('active');

    // Ngarko iframe vetëm nëse nuk është ngarkuar më parë
    if(targetPage.innerHTML.trim() === "") {
      const srcMap = {
        'home': 'Kredia.html',
        'produktet': 'Produktet.html',
        'paga': 'Paga.html',
        'about': 'About.html',
        'privacy': 'Privacy.html'
      };
      targetPage.innerHTML = `<iframe src="${srcMap[pageId]}" loading="lazy"></iframe>`;
    }
  }

  // Ngarkimi i faqes kryesore sapo hapet app-i
  window.onload = () => {
    showPage('home');
  };
</script>

</body>
</html>
