<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LLOGARITES</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root{
--ios-blue:#007AFF;
--ios-bg:#F2F2F7;
--ios-card:rgba(255,255,255,0.85);
--text:#000;
--transition:.35s cubic-bezier(.25,1,.5,1);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--ios-bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */
header{
background:var(--ios-card);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
height:64px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
border-bottom:.5px solid rgba(0,0,0,0.1);
position:sticky;
top:0;
z-index:100;
}

.header-logo-container{
position:absolute;
left:50%;
transform:translateX(-50%);
cursor:pointer;
display:flex;
align-items:center;
}

.header-logo-full{
height:32px;
max-width:180px;
object-fit:contain;
}

.menu-btn{
background:none;
border:none;
color:var(--ios-blue);
cursor:pointer;
padding:8px;
display:flex;
align-items:center;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
right:-100%;
width:280px;
height:100%;
background:var(--ios-bg);
z-index:200;
transition:var(--transition);
display:flex;
flex-direction:column;
border-left:.5px solid rgba(0,0,0,0.1);
}

.sidebar.active{ right:0; }

.sidebar-header{
padding:50px 20px 20px;
}

.sidebar-menu{
flex:1;
padding:15px;
overflow-y:auto;
}

.menu-group{
background:white;
border-radius:12px;
margin-bottom:18px;
overflow:hidden;
border:.5px solid rgba(0,0,0,0.05);
}

.menu-item{
display:flex;
align-items:center;
width:100%;
padding:12px 15px;
border:none;
background:none;
font-size:16px;
cursor:pointer;
gap:12px;
border-bottom:.5px solid #F2F2F7;
color:#000; /* emertimi zi */
}

.menu-item i{ color:var(--ios-blue); width:20px; }

/* overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
opacity:0;
visibility:hidden;
z-index:150;
transition:.3s;
backdrop-filter:blur(3px);
}

.overlay.active{ opacity:1; visibility:visible; }

/* MAIN */
main{
flex:1;
background:white;
overflow:hidden;
position:relative;
}

.page{
display:none;
width:100%;
height:100%;
}

.page.active{ display:block; }

iframe{ width:100%; height:100%; border:none; }

.sidebar-footer{
padding:20px;
font-size:11px;
color:#8E8E93;
border-top:.5px solid rgba(0,0,0,0.05);
}

</style>
</head>

<body>

<header>
<div style="width:40px"></div>

<div class="header-logo-container" onclick="reloadApp()">
<img src="logo-full.png" class="header-logo-full">
</div>

<button class="menu-btn" onclick="toggleMenu()">
<i data-lucide="menu"></i>
</button>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<aside class="sidebar" id="sidebar">

<div class="sidebar-header">
<h3>MENU</h3>
<p>Financë & Software</p>
</div>

<div class="sidebar-menu">

<!-- GRUPI I MODULËVE -->
<div class="menu-group">
<button class="menu-item" onclick="showPage('home')">
<i data-lucide="calculator"></i>
Kredi
</button>

<button class="menu-item" onclick="showPage('produktet')">
<i data-lucide="bar-chart-3"></i>
Produkte & Interes
</button>

<button class="menu-item" onclick="showPage('paga')">
<i data-lucide="banknote"></i>
Paga Bruto/Neto
</button>

<button class="menu-item" onclick="showPage('direktiva')">
<i data-lucide="file-text"></i>
Direktiva / UB
</button>

<button class="menu-item" onclick="showPage('module1')">
<i data-lucide="layers"></i>
Module 1
</button>

<button class="menu-item" onclick="showPage('module2')">
<i data-lucide="layers"></i>
Module 2
</button>
</div>

<!-- GRUPI TJETER: UPDATE & KONTAKT -->
<div class="menu-group">
<button class="menu-item" onclick="reloadApp()">
<i data-lucide="refresh-cw"></i>
Update
</button>

<button class="menu-item" onclick="window.location.href='tel:+355697788108'">
<i data-lucide="phone-call"></i>
Kontakti Direkt
</button>

<button class="menu-item" onclick="window.location.href='mailto:ernest.borici@gmail.com'">
<i data-lucide="mail"></i>
Sugjero një përmirësim
</button>
</div>

<!-- GRUPI TJETER: INFO & PRIVACY -->
<div class="menu-group">
<button class="menu-item" onclick="showPage('about')">
<i data-lucide="info"></i>
Rreth Nesh
</button>

<button class="menu-item" onclick="showPage('privacy')">
<i data-lucide="shield"></i>
Privacy Policy
</button>
</div>

</div>

<div class="sidebar-footer">
2026 <b>Ernest Boriçi</b><br>
© All rights reserved.
</div>

</aside>

<main>
<section id="home" class="page"></section>
<section id="produktet" class="page"></section>
<section id="paga" class="page"></section>
<section id="direktiva" class="page"></section>
<section id="module1" class="page"></section>
<section id="module2" class="page"></section>
<section id="about" class="page"></section>
<section id="privacy" class="page"></section>
</main>

<script>
lucide.createIcons();

const sidebar=document.getElementById('sidebar');
const overlay=document.getElementById('overlay');

function toggleMenu(){
sidebar.classList.toggle('active');
overlay.classList.toggle('active');
}

function reloadApp(){ location.reload(true); }

/* SHFAQ FAQEN */
function showPage(pageId){
if(sidebar.classList.contains('active')) toggleMenu();

/* shfaq faqet */
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
const target=document.getElementById(pageId);
if(target) target.classList.add('active');

/* lazy load */
if(target.innerHTML.trim()===""){
const srcMap={
home:"Kredia.html",
produktet:"Produktet.html",
paga:"Paga.html",
direktiva:"Direktiva.html",
module1:"Module1.html",
module2:"Module2.html",
about:"About.html",
privacy:"Privacy.html"
};
target.innerHTML=`<iframe src="${srcMap[pageId]}" loading="lazy"></iframe>`;
}
}

/* AUTO OPEN HOME */
window.onload=()=>{ showPage("home"); }

/* PULL TO REFRESH */
let touchStart=0;
document.addEventListener("touchstart",e=>{ touchStart=e.touches[0].clientY; });
document.addEventListener("touchend",e=>{
let touchEnd=e.changedTouches[0].clientY;
if(touchEnd-touchStart>120) reloadApp();
});
</script>

</body>
</html>
